name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main

jobs:
  build:
     name: BACKEND-FRONTEND Build
     runs-on: ubuntu-latest

     steps:
       - name: checking codes
         uses: actions/checkout@v4

       - name: node backend
         uses: actions/setup-node@v4
         with:
           node-version: "20"

       - name: Installing backend dependencies
         working-directory: backend
         run: npm install

       - name: Angular frontend
         uses: actions/setup-node@v4
         with:
           node-version: "20"

       - name: Installing frontend dependancies
         working-directory: frontend
         run: npm install

       - name: Build frontend
         working-directory: frontend
         run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Backend
      run: |
        docker build -t alaypatel212/backend ./backend
        docker push alaypatel212/backend

    - name: Build & Push Frontend
      run: |
        docker build -t alaypatel212/frontend ./frontend
        docker push alaypatel212/frontend

    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd DD_assignment
          docker compose pull
          docker compose up -d
