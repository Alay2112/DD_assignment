services:
  mongo:
    image: mongo
    ports:
    - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - mongo_data:/data/db
    restart: unless-stopped
 
  backend:
    image: backend
    build: ./backend
    env_file:
    - ./backend/.env
    ports:
    - "5050:5050"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: frontend
    build: ./frontend
    ports:
    - "4200:4200"
    depends_on:
    - backend
    restart: unless-stopped
  
  nginx:
    image: nginx:alpine
    ports:
    - "80:80"
    volumes:
    - ./NGINX/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
    - frontend
    - backend
    restart: unless-stopped
  
volumes:
  mongo_data: